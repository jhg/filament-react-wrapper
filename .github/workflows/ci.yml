name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'

jobs:
  # Node is intentionally tested independently from PHP. It is the asset
  # toolchain, not a framework-version constraint.
  frontend:
    name: Frontend (Node ${{ matrix.node-version }} / React ${{ matrix.react-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '20'
            react-version: '18'
          - node-version: '22'
            react-version: '18'
          - node-version: '24'
            react-version: '18'
          - node-version: '24'
            react-version: '19'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify alternate React major
        if: matrix.react-version == '19'
        run: npm install --no-save --package-lock=false --ignore-scripts "react@^${{ matrix.react-version }}.0.0" "react-dom@^${{ matrix.react-version }}.0.0"

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint:check

      - name: Build package
        run: npm run build

      - name: Run tests with coverage gate
        run: npm run test:coverage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # Explicitly supported framework combinations. A Cartesian product would
  # include invalid combinations such as Filament 5 with Livewire 3.
  backend:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel_name }} / Filament ${{ matrix.filament_name }} / Livewire ${{ matrix.livewire_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^11.50'
            laravel_name: '11'
            filament: '^3.0'
            filament_name: '3'
            livewire: '^3.0'
            livewire_name: '3'
            testbench: '^9.0'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '^12.0'
            laravel_name: '12'
            filament: '^3.0'
            filament_name: '3'
            livewire: '^3.0'
            livewire_name: '3'
            testbench: '^10.0'
            phpunit: '^12.0'
          - php: '8.2'
            laravel: '^11.50'
            laravel_name: '11'
            filament: '^4.0'
            filament_name: '4'
            livewire: '^3.0'
            livewire_name: '3'
            testbench: '^9.0'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '^12.0'
            laravel_name: '12'
            filament: '^4.0'
            filament_name: '4'
            livewire: '^3.0'
            livewire_name: '3'
            testbench: '^10.0'
            phpunit: '^12.0'
          - php: '8.2'
            laravel: '^11.50'
            laravel_name: '11'
            filament: '^5.0'
            filament_name: '5'
            livewire: '^4.0'
            livewire_name: '4'
            testbench: '^9.0'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '^12.0'
            laravel_name: '12'
            filament: '^5.0'
            filament_name: '5'
            livewire: '^4.0'
            livewire_name: '4'
            testbench: '^10.0'
            phpunit: '^12.0'
          - php: '8.3'
            laravel: '^13.1'
            laravel_name: '13'
            filament: '^5.0'
            filament_name: '5'
            livewire: '^4.0'
            livewire_name: '4'
            testbench: '^11.0'
            phpunit: '^12.0'
          - php: '8.4'
            laravel: '^13.1'
            laravel_name: '13'
            filament: '^5.0'
            filament_name: '5'
            livewire: '^4.0'
            livewire_name: '4'
            testbench: '^11.0'
            phpunit: '^13.0'
          - php: '8.5'
            laravel: '^13.1'
            laravel_name: '13'
            filament: '^5.0'
            filament_name: '5'
            livewire: '^4.0'
            livewire_name: '4'
            testbench: '^11.0'
            phpunit: '^13.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Resolve framework combination
        env:
          # Laravel 11 is retained as a compatibility target even though
          # current Packagist metadata flags its supported releases. Keep
          # security blocking disabled only for this compatibility resolver;
          # dependency auditing remains a separate concern.
          COMPOSER_NO_SECURITY_BLOCKING: '1'
        run: >-
          composer update
          "laravel/framework:${{ matrix.laravel }}"
          "filament/filament:${{ matrix.filament }}"
          "livewire/livewire:${{ matrix.livewire }}"
          "orchestra/testbench:${{ matrix.testbench }}"
          "phpunit/phpunit:${{ matrix.phpunit }}"
          --with-all-dependencies --prefer-dist --no-interaction --no-progress

      - name: Run PHP tests
        run: vendor/bin/phpunit -c phpunit.xml.dist

  # Security Check
  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level moderate || true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
        continue-on-error: true
